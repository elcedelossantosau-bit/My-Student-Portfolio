<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Elysa Student Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html, body {
      height: 100%;
      background: linear-gradient(to right, #ffe4ec, #ffd6e0);
      color: #4b2c35;
      text-align: center;
    }

    body {
      overflow-x: hidden;
    }

    .container {
      margin-top: 60px;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 25px;
      background-color: #1e3a8a;
      color: white;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      background-color: #274bb5;
      transform: scale(1.05);
    }

    .petal {
      position: fixed;
      top: -10px;
      width: 15px;
      height: 15px;
      background: pink;
      border-radius: 50%;
      opacity: 0.7;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }
  </style>
</head>

<body>

<script>
  for (let i = 0; i < 20; i++) {
    let petal = document.createElement("div");
    petal.className = "petal";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (Math.random() * 5 + 5) + "s";
    document.body.appendChild(petal);
  }
</script>

<div class="container">
  <h1>Hello, I'm Elysa! 🌸</h1>
  <p>BSIT Student | Aspiring IT Professional</p>

  <a href="portfolio.pdf" target="_blank" class="btn">
    OPEN MY PORTFOLIO (PDF)
  </a>
</div>

</body>
</html>
